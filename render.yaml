services:
  - type: web
    name: fastapi-task-manager
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: PORT
        value: "8000"

databases:
  - name: taskmanager-db
    region: oregon
    plan: free
    databaseName: taskmanager
    user: taskmanager
    postgresMajorVersion: "16"